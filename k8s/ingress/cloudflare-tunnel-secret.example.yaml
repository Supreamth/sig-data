apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-secret
  namespace: sig-data
type: Opaque
stringData:
  # Replace with the credentials JSON downloaded/generated by Cloudflare Tunnel.
  # Do not commit the configured secret file.
  credentials.json: |
    {
      "AccountTag": "your-cloudflare-account-tag",
      "TunnelSecret": "your-cloudflare-tunnel-secret",
      "TunnelID": "your-cloudflare-tunnel-id"
    }

# Instructions:
# 1. Copy this file:
#      cp k8s/ingress/cloudflare-tunnel-secret.example.yaml k8s/ingress/cloudflare-tunnel-secret.yaml
# 2. Replace the placeholder values with the real Cloudflare Tunnel credentials.
# 3. Apply it:
#      kubectl apply -f k8s/ingress/cloudflare-tunnel-secret.yaml
# 4. Keep cloudflare-tunnel-secret.yaml local and never commit it.
